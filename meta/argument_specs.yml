---

argument_specs:
  main:
    short_description: Manage binaries and scripts install, update, download, ...
    description:
      - Setup custom APT repositories (Debian systems only)
      - Install base packages list (Debian / RHEL-based systems and flatpak)
      - Provides tasks to upgrade packages on manages systems, supporting an exclusion list (Debian / RHEL-based systems and flatpak)
      - Downloads standalone binaries (ready to go, archived or .deb files) and install them locally

    options:
      ansible_bin_apt_custom_repositories_common:
        description: |
          List of custom apt repositories that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: dict
        required: false
        default: []
        options:
          repoName:
            description: Repository name. doesn't need to match anything
            type: str
            required: true
          repoBaseUrl:
            description: Repository base URL
            type: str
            required: true
          repoTypes:
            description: Repository types (binaries, sources or both)
            type: list
            choices:
              - deb
              - deb-src
            required: false
            default:
              - deb
          repoDistributionReleases:
            description: Repository releases / suites (bookworm, stable, ...)
            type: list
            required: false
            default:
              - /
          repoComponents:
            description: Repository components (contrib, non-free, ...)
            type: list
            required: false
            default: []
          repoArchitecture:
            description: Repository intended architectures (amd64, arm64, ...)
            type: list
            required: false
            default:
              - amd64
          repoSigningKey:
            description: |
              Public signing key (usually GPG) used to sign repository binaries (and / or metadata). Has to be armored
              Key is passed as-is instead of a link for module to download as I understand there wouldn't be any verification
            type: str
            required: false
            default: null
          repoIsTrusted:
            description: Whether repository is trusted. Skips signatures verification
            type: bool
            required: false
            default: null

      ansible_bin_apt_custom_repositories:
        description: |
          List of custom apt repositories that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: dict
        required: false
        default: []
        options:
          repoName:
            description: Repository name. doesn't need to match anything
            type: str
            required: true
          repoBaseUrl:
            description: Repository base URL
            type: str
            required: true
          repoTypes:
            description: Repository types (binaries, sources or both)
            type: list
            choices:
              - deb
              - deb-src
            required: false
            default:
              - deb
          repoDistributionReleases:
            description: Repository releases / suites (bookworm, stable, ...)
            type: list
            required: false
            default:
              - /
          repoComponents:
            description: Repository components (contrib, non-free, ...)
            type: list
            required: false
            default: []
          repoArchitecture:
            description: Repository intended architectures (amd64, arm64, ...)
            type: list
            required: false
            default:
              - amd64
          repoSigningKey:
            description: |
              Public signing key (usually GPG) used to sign repository binaries (and / or metadata). Has to be armored
              Key is passed as-is instead of a link for module to download as I understand there wouldn't be any verification
            type: str
            required: false
            default: null
          repoIsTrusted:
            description: Whether repository is trusted. Skips signatures verification
            type: bool
            required: false
            default: null

      ansible_bin_dnf_packages_common:
        description: |
          List of rpm packages (installed through dnf) that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_dnf_packages:
        description: |
          List of rpm packages (installed through dnf) that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_apt_packages_common:
        description: |
          List of dpkg packages (installed through apt) that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_apt_packages:
        description: |
          List of dpkg packages (installed through apt) that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_packages_versionlock_common:
        description: |
          List of packages to exclude from update tasks
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_packages_versionlock:
        description: |
          List of packages to exclude from update tasks
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: str
        required: false
        default: []

      ansible_bin_autoreboot:
        description: |
          Whether to automatically reboot systems after updates, if required
        type: bool
        required: false
        default: false

      ansible_bin_flatpak_custom_repositories_common:
        description: |
          List of custom flatpak remotes that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: dict
        required: false
        default:
          - repoName: flathub
            repoUrl: https://dl.flathub.org/repo/flathub.flatpakrepo
            repoInstallMethod: user
        options:
          repoName:
            description: Repository (remote) name. doesn't need to match anything
            type: str
            required: true
          repoUrl:
            description: Repository (remote) URL
            type: str
            required: true
          repoInstallMethod:
            description: Whether repository (remote) is installed globally (system) or only for the current user
            type: str
            required: false
            default: user

      ansible_bin_flatpak_custom_repositories:
        description: |
          List of custom flatpak remotes that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: dict
        required: false
        default: []
        options:
          repoName:
            description: Repository (remote) name. doesn't need to match anything
            type: str
            required: true
          repoUrl:
            description: Repository (remote) URL
            type: str
            required: true
          repoInstallMethod:
            description: Whether repository (remote) is installed globally (system) or only for the current user
            type: str
            required: false
            default: user

      ansible_bin_flatpak_packages_common:
        description: |
          List of flatpak packages that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: dict
        required: false
        default: []
        options:
          pkgId:
            description: Flatpak package ID
            type: str
            required: true
          pkgInstallMethod:
            description: Whether package is installed globally (system) or only for the current user
            type: str
            required: false
            default: user

      ansible_bin_flatpak_packages:
        description: |
          List of flatpak packages that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: dict
        required: false
        default: []
        options:
          pkgId:
            description: Flatpak package ID
            type: str
            required: true
          pkgInstallMethod:
            description: Whether package is installed globally (system) or only for the current user
            type: str
            required: false
            default: user

      ansible_bin_binaries_packages_common:
        description: |
          List of standalone binaries that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be the common list
        type: list
        elements: dict
        required: false
        default: []
        options:
          pkgName:
            description: Binary file destination name, doesn't need to match anything
            type: str
            required: false
            default: "<pkgUrl_last_part>"
          pkgVersion:
            description: |
              Binary file version to download
              Mainly used to consistently track installed version (through a matrix file), as it's more simple than trying to extract it from the URL
            type: str
            required: true
          pkgUrl:
            description: Binary file download URL
            type: str
            required: true
          pkgChecksum:
            description: "Checksum to verify against the downloaded binary file. Format: <algorithm>:<checksum|url>"
            type: str
            required: false
            default: null
          pkgDestPath:
            description: Full path to have the final binary files (after extraction, if applicable) available to
            type: str
            required: false
            default: "$HOME/.local/bin/<pkgUrl_last_part>"
          pkgArchiveFilesToExtract:
            description: List of files to extract from downloaded archive, if applicable
            type: list
            elements: str
            required: false
            default: null

      ansible_bin_binaries_packages:
        description: |
          List of standalone binaries that must be present on managed nodes
          There are two lists available, which are merged on run. Useful for instance to have one common in group_vars and another specific for each host
          This one is intended to be a more specific list
        type: list
        elements: dict
        required: false
        default: []
        options:
          pkgName:
            description: Binary file destination name, doesn't need to match anything
            type: str
            required: false
            default: "<pkgUrl_last_part>"
          pkgVersion:
            description: |
              Binary file version to download
              Mainly used to consistently track installed version (through a matrix file), as it's more simple than trying to extract it from the URL
            type: str
            required: true
          pkgUrl:
            description: Binary file download URL
            type: str
            required: true
          pkgChecksum:
            description: "Checksum to verify against the downloaded binary file. Format: <algorithm>:<checksum|url>"
            type: str
            required: false
            default: null
          pkgDestPath:
            description: Full path to have the final binary files (after extraction, if applicable) available to
            type: str
            required: false
            default: "$HOME/.local/bin/<pkgUrl_last_part>"
          pkgArchiveFilesToExtract:
